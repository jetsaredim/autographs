[package]
name = "autographs-controller"
version = "0.1.0"
edition = "2024"

[features]
live-persistence = ["dep:oracle-rs", "dep:rust-s3"]

[dependencies]
argon2 = "0.5"
async-trait = "0.1"
axum = { version = "0.8", features = ["multipart"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
time = { version = "0.3", features = ["serde"] }
tokio = { version = "1.0", features = ["fs", "macros", "net", "rt-multi-thread"] }
uuid = { version = "1.0", features = ["serde", "v4"] }
oracle-rs = { version = "0.1.7", optional = true }
rust-s3 = { version = "0.37.2", default-features = false, features = ["tokio-rustls-tls"], optional = true }

[dev-dependencies]
tempfile = "3.0"
tower = { version = "0.5", features = ["util"] }
