name: Apply Security Updates

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: write

concurrency:
  group: production-security-updates
  cancel-in-progress: false

jobs:
  update:
    name: Apply approved production security updates
    if: >-
      github.event.label.name == 'approved-production-update' &&
      github.event.issue.pull_request == null
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve runtime VM IP
        id: resolve
        uses: ./.github/actions/resolve-runtime-ip
        with:
          oci-private-key-pem: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
          oci-cli-user-ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          oci-tenancy-ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-object-storage-namespace: ${{ vars.OCI_OBJECT_STORAGE_NAMESPACE }}
          vm-public-ip: ${{ vars.VM_PUBLIC_IP }}

      - name: Install cleanup Ansible tooling
        run: python3 -m pip install --user ansible

      - name: Install cleanup Ansible collections
        run: ansible-galaxy collection install -r deploy/ansible/collections/requirements.yml

      - name: Run security update playbook
        id: security_update
        continue-on-error: true
        uses: dawidd6/action-ansible-playbook@126642a1c6ce512da255ef2b41e8ee90f0077474 # v9
        env:
          ANSIBLE_CONFIG: deploy/ansible/ansible.cfg
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          PATCH_APPROVER: ${{ github.actor }}
          PATCH_ISSUE_NUMBER: ${{ github.event.issue.number }}
        with:
          playbook: playbooks/security-patch.yml
          directory: deploy/ansible
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          inventory: |
            [runtime]
            production ansible_host=${{ steps.resolve.outputs.runtime_public_ip }} ansible_user=${{ vars.DEPLOY_SSH_USER || 'opc' }}
          requirements: collections/requirements.yml
          options: |
            --extra-vars security_patching_issue_number=${{ github.event.issue.number }}
            --extra-vars security_patching_approver=${{ github.actor }}
            --extra-vars security_patching_approval_label=approved-production-update
            --extra-vars security_patching_target_group=runtime

      - name: Cleanup failed security update request
        if: always() && steps.security_update.outcome != 'success'
        env:
          ANSIBLE_CONFIG: deploy/ansible/ansible.cfg
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: |
          ansible-playbook \
            --extra-vars security_patching_issue_number=${{ github.event.issue.number }} \
            --extra-vars security_patching_approval_label=approved-production-update \
            --extra-vars security_patching_workflow_outcome=${{ steps.security_update.outcome }} \
            deploy/ansible/playbooks/security-patch-cleanup.yml

      - name: Fail after cleanup if update failed
        if: steps.security_update.outcome != 'success'
        run: exit 1
