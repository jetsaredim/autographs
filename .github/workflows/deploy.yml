name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recreate_runtime_instance:
        description: "Force Terraform to recreate the runtime VM before deploying"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_app_image_build:
        description: "Force rebuilding the app, tools, and controller images before deploying"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GHCR_IMAGE_REPOSITORY: ${{ vars.GHCR_IMAGE_REPOSITORY || format('ghcr.io/{0}/app', github.repository) }}
  AUTOGRAPHS_HTTP_PORT: "80"
  AUTOGRAPHS_HTTPS_PORT: "443"
  AUTOGRAPHS_DOMAIN: ${{ vars.AUTOGRAPHS_DOMAIN || 'autographs.jetsaredim.net' }}
  AUTOGRAPHS_CONTROLLER_DB_PROVIDER: ${{ vars.AUTOGRAPHS_CONTROLLER_DB_PROVIDER || 'oracle' }}
  AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER: ${{ vars.AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER || 'oci-instance-principal' }}

jobs:
  detect-app-image-changes:
    name: Detect app image changes
    runs-on: ubuntu-latest

    outputs:
      build_app_image: ${{ steps.detect.outputs.build_app_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect app image changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app:
              - "app/**"
              - "controller/**"
              - "package.json"
              - "pnpm-workspace.yaml"
              - "pnpm-lock.yaml"
              - ".github/docker-bake.hcl"
              - ".github/workflows/deploy.yml"

      - name: Resolve app image build decision
        id: detect
        env:
          BUILD_APP_IMAGE: ${{ steps.changes.outputs.app == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_app_image_build == 'true') }}
        run: echo "build_app_image=${BUILD_APP_IMAGE}" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: detect-app-image-changes
    if: needs.detect-app-image-changes.outputs.build_app_image == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish images
        uses: docker/bake-action@v7
        env:
          GHCR_IMAGE_REPOSITORY: ${{ env.GHCR_IMAGE_REPOSITORY }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          files: |
            .github/docker-bake.hcl
          push: true

  resolve-app-images:
    name: Resolve app images
    runs-on: ubuntu-latest
    needs:
      - detect-app-image-changes
      - build-images
    if: always()

    outputs:
      app_image: ${{ steps.resolve.outputs.app_image }}
      tools_image: ${{ steps.resolve.outputs.tools_image }}
      controller_image: ${{ steps.resolve.outputs.controller_image }}
      uses_production_images: ${{ steps.resolve.outputs.uses_production_images }}

    steps:
      - name: Log in to ghcr.io for image resolution
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve deploy image references
        id: resolve
        env:
          BUILD_APP_IMAGE: ${{ needs.detect-app-image-changes.outputs.build_app_image }}
          BUILD_IMAGES_RESULT: ${{ needs.build-images.result }}
          DETECT_APP_IMAGE_CHANGES_RESULT: ${{ needs.detect-app-image-changes.result }}
          GHCR_IMAGE_REPOSITORY: ${{ env.GHCR_IMAGE_REPOSITORY }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$DETECT_APP_IMAGE_CHANGES_RESULT" != "success" ]; then
            echo "App image change detection failed with result: $DETECT_APP_IMAGE_CHANGES_RESULT" >&2
            exit 1
          fi

          if [ "$BUILD_APP_IMAGE" = "true" ]; then
            if [ "$BUILD_IMAGES_RESULT" != "success" ]; then
              echo "App image build was required but build-images finished with result: $BUILD_IMAGES_RESULT" >&2
              exit 1
            fi

            app_tag="${GHCR_IMAGE_REPOSITORY}:${GITHUB_SHA}"
            tools_tag="${GHCR_IMAGE_REPOSITORY}-tools:${GITHUB_SHA}"
            controller_tag="${GHCR_IMAGE_REPOSITORY}-controller:${GITHUB_SHA}"
            uses_production_images=false
          else
            app_tag="${GHCR_IMAGE_REPOSITORY}:production"
            tools_tag="${GHCR_IMAGE_REPOSITORY}-tools:production"
            controller_tag="${GHCR_IMAGE_REPOSITORY}-controller:production"
            uses_production_images=true
          fi

          resolve_digest() {
            local image_tag="$1"
            local digest

            digest="$(docker buildx imagetools inspect "$image_tag" --format '{{ .Manifest.Digest }}')"
            if [ -z "$digest" ]; then
              echo "Could not resolve digest for $image_tag" >&2
              exit 1
            fi

            printf '%s' "$digest"
          }

          app_digest="$(resolve_digest "$app_tag")"
          tools_digest="$(resolve_digest "$tools_tag")"
          controller_digest="$(resolve_digest "$controller_tag")"

          {
            echo "app_image=${GHCR_IMAGE_REPOSITORY}@${app_digest}"
            echo "tools_image=${GHCR_IMAGE_REPOSITORY}-tools@${tools_digest}"
            echo "controller_image=${GHCR_IMAGE_REPOSITORY}-controller@${controller_digest}"
            echo "uses_production_images=${uses_production_images}"
          } >> "$GITHUB_OUTPUT"

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest

    outputs:
      runtime_public_ip: ${{ steps.terraform_apply.outputs.runtime_public_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.6"
          terraform_wrapper: false

      - name: Write OCI API private key
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
        run: |
          mkdir -p "$RUNNER_TEMP/oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/oci/api_key.pem"
          chmod 600 "$RUNNER_TEMP/oci/api_key.pem"

      - name: Terraform apply
        id: terraform_apply
        working-directory: infra/terraform
        env:
          OCI_CLI_USER_OCID: ${{ secrets.OCI_CLI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PATH: ${{ runner.temp }}/oci/api_key.pem
          OCI_REGION: us-ashburn-1
          tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          user_ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key_path: ${{ runner.temp }}/oci/api_key.pem
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: ${{ runner.temp }}/oci/api_key.pem
          TF_VAR_compartment_ocid: ${{ vars.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_runtime_image_ocid: ${{ vars.OCI_RUNTIME_IMAGE_OCID }}
          TF_VAR_runtime_shape: ${{ vars.OCI_RUNTIME_SHAPE || 'VM.Standard.E2.1.Micro' }}
          TF_VAR_runtime_ocpus: ${{ vars.OCI_RUNTIME_OCPUS || 1 }}
          TF_VAR_runtime_memory_gbs: ${{ vars.OCI_RUNTIME_MEMORY_GBS || 1 }}
          TF_VAR_runtime_ssh_public_keys: ${{ vars.OCI_RUNTIME_SSH_PUBLIC_KEYS || '[]' }}
          TF_VAR_runtime_deploy_user: ${{ vars.DEPLOY_SSH_USER || 'opc' }}
          TF_VAR_runtime_deploy_path: ${{ vars.DEPLOY_PATH || '/opt/autographs' }}
          TF_VAR_create_autonomous_database: ${{ vars.OCI_CREATE_AUTONOMOUS_DATABASE || 'false' }}
          TF_VAR_autonomous_database_name: ${{ vars.OCI_AUTONOMOUS_DATABASE_NAME || 'autographsdb' }}
          TF_VAR_autonomous_database_display_name: ${{ vars.OCI_AUTONOMOUS_DATABASE_DISPLAY_NAME || 'autographs-prod-adb' }}
          TF_VAR_autonomous_database_admin_password: ${{ secrets.ADB_ADMIN_PASSWORD }}
          TF_VAR_autonomous_database_is_mtls_connection_required: ${{ vars.OCI_AUTONOMOUS_DATABASE_IS_MTLS_CONNECTION_REQUIRED || 'true' }}
          TF_VAR_create_media_bucket: ${{ vars.OCI_CREATE_MEDIA_BUCKET || 'false' }}
          TF_VAR_media_bucket_namespace: ${{ vars.OCI_MEDIA_NAMESPACE || vars.OCI_OBJECT_STORAGE_NAMESPACE }}
          TF_VAR_media_bucket_name: ${{ vars.OCI_MEDIA_BUCKET_NAME || 'autographs-media-prod' }}
          TF_VAR_porkbun_api_key: ${{ secrets.PORKBUN_API_KEY }}
          TF_VAR_porkbun_secret_key: ${{ secrets.PORKBUN_SECRET_KEY }}
          TF_VAR_autographs_dns_domain: ${{ vars.AUTOGRAPHS_DNS_DOMAIN || 'jetsaredim.net' }}
          TF_VAR_autographs_dns_subdomain: ${{ vars.AUTOGRAPHS_DNS_SUBDOMAIN || 'autographs' }}
          TF_VAR_autographs_dns_ttl: ${{ vars.AUTOGRAPHS_DNS_TTL || 600 }}
          TF_VAR_autographs_dns_record_id: ${{ vars.AUTOGRAPHS_DNS_RECORD_ID }}
        run: |
          terraform init \
            -backend-config="bucket=autographs-tf-state" \
            -backend-config="namespace=${{ vars.OCI_OBJECT_STORAGE_NAMESPACE }}" \
            -backend-config="region=us-ashburn-1" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="workspace_key_prefix=envs" \
            -backend-config="auth=APIKey"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.recreate_runtime_instance }}" = "true" ]; then
            if terraform state list | grep -Fxq 'module.compute.oci_core_instance.runtime[0]'; then
              terraform taint 'module.compute.oci_core_instance.runtime[0]'
            else
              echo "Runtime instance is not in Terraform state; skipping taint."
            fi
          fi
          terraform apply -auto-approve
          echo "runtime_public_ip=$(terraform output -raw runtime_public_ip)" >> "$GITHUB_OUTPUT"

  deploy-runtime:
    name: Deploy runtime to VM
    runs-on: ubuntu-latest

    needs:
      - resolve-app-images
      - terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@v9
        env:
          ANSIBLE_CONFIG: deploy/ansible/ansible.cfg
          AUTOGRAPHS_OPERATOR_API_TOKEN: ${{ secrets.AUTOGRAPHS_OPERATOR_API_TOKEN }}
          AUTOGRAPHS_ADMIN_PASSWORD_HASH: ${{ secrets.AUTOGRAPHS_ADMIN_PASSWORD_HASH }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OCI_CLI_USER_OCID: ${{ secrets.OCI_CLI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          ORACLE_DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
          ORACLE_DB_WALLET_PASSWORD: ${{ secrets.ORACLE_DB_WALLET_PASSWORD }}
          ORACLE_DB_WALLET_ZIP_BASE64: ${{ secrets.ORACLE_DB_WALLET_ZIP_BASE64 }}
        with:
          playbook: playbooks/deploy.yml
          directory: deploy/ansible
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          inventory: |
            [runtime]
            ${{ needs.terraform-apply.outputs.runtime_public_ip || vars.VM_PUBLIC_IP }} ansible_user=${{ vars.DEPLOY_SSH_USER || 'opc' }}
          requirements: collections/requirements.yml
          options: |
            --extra-vars autographs_app_image=${{ needs.resolve-app-images.outputs.app_image }}
            --extra-vars autographs_tools_image=${{ needs.resolve-app-images.outputs.tools_image }}
            --extra-vars autographs_controller_image=${{ needs.resolve-app-images.outputs.controller_image }}
            --extra-vars autographs_deploy_domain=${{ env.AUTOGRAPHS_DOMAIN }}
            --extra-vars autographs_deploy_http_port=${{ env.AUTOGRAPHS_HTTP_PORT }}
            --extra-vars autographs_deploy_https_port=${{ env.AUTOGRAPHS_HTTPS_PORT }}
            --extra-vars autographs_deploy_controller_db_provider=${{ env.AUTOGRAPHS_CONTROLLER_DB_PROVIDER }}
            --extra-vars autographs_deploy_controller_media_storage_provider=${{ env.AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER }}
            --extra-vars oci_media_namespace=${{ vars.OCI_MEDIA_NAMESPACE || vars.OCI_OBJECT_STORAGE_NAMESPACE }}
            --extra-vars oci_media_bucket_name=${{ vars.OCI_MEDIA_BUCKET_NAME || 'autographs-media-prod' }}
            --extra-vars autographs_deploy_ssh_ready_timeout_seconds=${{ vars.DEPLOY_SSH_READY_TIMEOUT_SECONDS || '900' }}
            --extra-vars autographs_deploy_ssh_ready_interval_seconds=${{ vars.DEPLOY_SSH_READY_INTERVAL_SECONDS || '10' }}

      - name: Verify deployment health
        env:
          AUTOGRAPHS_DOMAIN: ${{ env.AUTOGRAPHS_DOMAIN }}
          AUTOGRAPHS_CONTROLLER_DB_PROVIDER: ${{ env.AUTOGRAPHS_CONTROLLER_DB_PROVIDER }}
          AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER: ${{ env.AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER }}
        run: |
          check_https_health() {
            local path="$1"
            local label="$2"

            for _ in $(seq 1 30); do
              if curl --fail --silent "https://${AUTOGRAPHS_DOMAIN}${path}" >/dev/null; then
                curl --fail --silent "https://${AUTOGRAPHS_DOMAIN}${path}"
                return 0
              fi
              sleep 5
            done

            echo "Deployment did not pass Caddy-fronted HTTPS ${label} check at ${path} for ${AUTOGRAPHS_DOMAIN}" >&2
            return 1
          }

          check_https_health "/health" "Next.js app"
          controller_health="$(check_https_health "/admin/api/health" "Rust controller admin API")"
          if ! printf '%s' "$controller_health" | grep -q "\"controllerDbProvider\":\"${AUTOGRAPHS_CONTROLLER_DB_PROVIDER}\""; then
            echo "Rust controller health did not report expected DB provider ${AUTOGRAPHS_CONTROLLER_DB_PROVIDER}: ${controller_health}" >&2
            exit 1
          fi
          if ! printf '%s' "$controller_health" | grep -q "\"controllerMediaStorageProvider\":\"${AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER}\""; then
            echo "Rust controller health did not report expected media provider ${AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER}: ${controller_health}" >&2
            exit 1
          fi
