name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recreate_runtime_instance:
        description: "Force Terraform to recreate the runtime VM before deploying"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  actions: write
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GHCR_IMAGE_REPOSITORY: ${{ vars.GHCR_IMAGE_REPOSITORY || format('ghcr.io/{0}/app', github.repository) }}
  AUTOGRAPHS_HTTP_PORT: "80"
  AUTOGRAPHS_HTTPS_PORT: "443"
  AUTOGRAPHS_DOMAIN: ${{ vars.AUTOGRAPHS_DOMAIN || 'autographs.jetsaredim.net' }}

jobs:
  build-images:
    name: Build and publish images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and publish images
        uses: docker/bake-action@v6
        env:
          GHCR_IMAGE_REPOSITORY: ${{ env.GHCR_IMAGE_REPOSITORY }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          files: |
            .github/docker-bake.hcl
          push: true

  terraform-apply:
    name: Terraform apply
    runs-on: ubuntu-latest

    outputs:
      runtime_public_ip: ${{ steps.terraform_apply.outputs.runtime_public_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Write OCI API private key
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
        run: |
          mkdir -p "$RUNNER_TEMP/oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/oci/api_key.pem"
          chmod 600 "$RUNNER_TEMP/oci/api_key.pem"

      - name: Terraform apply
        id: terraform_apply
        working-directory: infra/terraform
        env:
          OCI_CLI_USER_OCID: ${{ secrets.OCI_CLI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PATH: ${{ runner.temp }}/oci/api_key.pem
          OCI_REGION: us-ashburn-1
          tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          user_ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key_path: ${{ runner.temp }}/oci/api_key.pem
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: ${{ runner.temp }}/oci/api_key.pem
          TF_VAR_compartment_ocid: ${{ vars.OCI_COMPARTMENT_OCID }}
          TF_VAR_availability_domain: ${{ vars.OCI_AVAILABILITY_DOMAIN }}
          TF_VAR_runtime_image_ocid: ${{ vars.OCI_RUNTIME_IMAGE_OCID }}
          TF_VAR_runtime_shape: ${{ vars.OCI_RUNTIME_SHAPE || 'VM.Standard.E2.1.Micro' }}
          TF_VAR_runtime_ocpus: ${{ vars.OCI_RUNTIME_OCPUS || 1 }}
          TF_VAR_runtime_memory_gbs: ${{ vars.OCI_RUNTIME_MEMORY_GBS || 1 }}
          TF_VAR_runtime_ssh_public_keys: ${{ vars.OCI_RUNTIME_SSH_PUBLIC_KEYS || '[]' }}
          TF_VAR_runtime_deploy_user: ${{ vars.DEPLOY_SSH_USER || 'opc' }}
          TF_VAR_runtime_deploy_path: ${{ vars.DEPLOY_PATH || '/opt/autographs' }}
          TF_VAR_create_autonomous_database: ${{ vars.OCI_CREATE_AUTONOMOUS_DATABASE || 'false' }}
          TF_VAR_autonomous_database_name: ${{ vars.OCI_AUTONOMOUS_DATABASE_NAME || 'autographsdb' }}
          TF_VAR_autonomous_database_display_name: ${{ vars.OCI_AUTONOMOUS_DATABASE_DISPLAY_NAME || 'autographs-prod-adb' }}
          TF_VAR_autonomous_database_admin_password: ${{ secrets.ADB_ADMIN_PASSWORD }}
          TF_VAR_autonomous_database_is_mtls_connection_required: ${{ vars.OCI_AUTONOMOUS_DATABASE_IS_MTLS_CONNECTION_REQUIRED || 'true' }}
          TF_VAR_create_media_bucket: ${{ vars.OCI_CREATE_MEDIA_BUCKET || 'false' }}
          TF_VAR_media_bucket_namespace: ${{ vars.OCI_MEDIA_NAMESPACE || vars.OCI_OBJECT_STORAGE_NAMESPACE }}
          TF_VAR_media_bucket_name: ${{ vars.OCI_MEDIA_BUCKET_NAME || 'autographs-media-prod' }}
          TF_VAR_porkbun_api_key: ${{ secrets.PORKBUN_API_KEY }}
          TF_VAR_porkbun_secret_key: ${{ secrets.PORKBUN_SECRET_KEY }}
          TF_VAR_autographs_dns_domain: ${{ vars.AUTOGRAPHS_DNS_DOMAIN || 'jetsaredim.net' }}
          TF_VAR_autographs_dns_subdomain: ${{ vars.AUTOGRAPHS_DNS_SUBDOMAIN || 'autographs' }}
          TF_VAR_autographs_dns_ttl: ${{ vars.AUTOGRAPHS_DNS_TTL || 600 }}
          TF_VAR_autographs_dns_record_id: ${{ vars.AUTOGRAPHS_DNS_RECORD_ID }}
        run: |
          terraform init \
            -backend-config="bucket=autographs-tf-state" \
            -backend-config="namespace=${{ vars.OCI_OBJECT_STORAGE_NAMESPACE }}" \
            -backend-config="region=us-ashburn-1" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="workspace_key_prefix=envs" \
            -backend-config="auth=APIKey"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.recreate_runtime_instance }}" = "true" ]; then
            if terraform state list | grep -Fxq 'module.compute.oci_core_instance.runtime[0]'; then
              terraform taint 'module.compute.oci_core_instance.runtime[0]'
            else
              echo "Runtime instance is not in Terraform state; skipping taint."
            fi
          fi
          terraform apply -auto-approve
          echo "runtime_public_ip=$(terraform output -raw runtime_public_ip)" >> "$GITHUB_OUTPUT"

  deploy-runtime:
    name: Deploy runtime to VM
    runs-on: ubuntu-latest

    needs:
      - build-images
      - terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@v9
        env:
          ANSIBLE_CONFIG: deploy/ansible/ansible.cfg
          AUTOGRAPHS_OPERATOR_API_TOKEN: ${{ secrets.AUTOGRAPHS_OPERATOR_API_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          OCI_CLI_USER_OCID: ${{ secrets.OCI_CLI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          ORACLE_DB_PASSWORD: ${{ secrets.ORACLE_DB_PASSWORD }}
          ORACLE_DB_WALLET_PASSWORD: ${{ secrets.ORACLE_DB_WALLET_PASSWORD }}
          ORACLE_DB_WALLET_ZIP_BASE64: ${{ secrets.ORACLE_DB_WALLET_ZIP_BASE64 }}
        with:
          playbook: playbooks/deploy.yml
          directory: deploy/ansible
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          inventory: |
            [runtime]
            ${{ needs.terraform-apply.outputs.runtime_public_ip || vars.VM_PUBLIC_IP }} ansible_user=${{ vars.DEPLOY_SSH_USER || 'opc' }}
          requirements: collections/requirements.yml
          options: |
            --extra-vars autographs_app_image=${{ env.GHCR_IMAGE_REPOSITORY }}:${{ github.sha }}
            --extra-vars autographs_tools_image=${{ env.GHCR_IMAGE_REPOSITORY }}-tools:${{ github.sha }}
            --extra-vars autographs_deploy_domain=${{ env.AUTOGRAPHS_DOMAIN }}
            --extra-vars autographs_deploy_http_port=${{ env.AUTOGRAPHS_HTTP_PORT }}
            --extra-vars autographs_deploy_https_port=${{ env.AUTOGRAPHS_HTTPS_PORT }}
            --extra-vars oci_media_namespace=${{ vars.OCI_MEDIA_NAMESPACE || vars.OCI_OBJECT_STORAGE_NAMESPACE }}
            --extra-vars oci_media_bucket_name=${{ vars.OCI_MEDIA_BUCKET_NAME || 'autographs-media-prod' }}
            --extra-vars autographs_deploy_ssh_ready_timeout_seconds=${{ vars.DEPLOY_SSH_READY_TIMEOUT_SECONDS || '900' }}
            --extra-vars autographs_deploy_ssh_ready_interval_seconds=${{ vars.DEPLOY_SSH_READY_INTERVAL_SECONDS || '10' }}

      - name: Verify deployment health
        env:
          AUTOGRAPHS_DOMAIN: ${{ env.AUTOGRAPHS_DOMAIN }}
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent "https://${AUTOGRAPHS_DOMAIN}/health" >/dev/null; then
              curl --fail --silent "https://${AUTOGRAPHS_DOMAIN}/health"
              exit 0
            fi
            sleep 5
          done

          echo "Deployment did not pass Caddy-fronted HTTPS /health check for ${AUTOGRAPHS_DOMAIN}" >&2
          exit 1
