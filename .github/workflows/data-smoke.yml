name: Data Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  data-smoke:
    name: Verify Oracle and private media
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"
          terraform_wrapper: false

      - name: Write OCI API private key
        env:
          OCI_PRIVATE_KEY_PEM: ${{ secrets.OCI_PRIVATE_KEY_PEM }}
        run: |
          mkdir -p "$RUNNER_TEMP/oci"
          printf '%s\n' "$OCI_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/oci/api_key.pem"
          chmod 600 "$RUNNER_TEMP/oci/api_key.pem"

      - name: Resolve runtime VM IP
        working-directory: infra/terraform
        env:
          OCI_REGION: us-ashburn-1
          OCI_CLI_USER_OCID: ${{ secrets.OCI_CLI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY_PATH: ${{ runner.temp }}/oci/api_key.pem
          tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          user_ocid: ${{ secrets.OCI_CLI_USER_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          private_key_path: ${{ runner.temp }}/oci/api_key.pem
          VM_PUBLIC_IP: ${{ vars.VM_PUBLIC_IP }}
        run: |
          terraform init \
            -backend-config="bucket=autographs-tf-state" \
            -backend-config="namespace=${{ vars.OCI_OBJECT_STORAGE_NAMESPACE }}" \
            -backend-config="region=us-ashburn-1" \
            -backend-config="key=envs/prod/terraform.tfstate" \
            -backend-config="workspace_key_prefix=envs" \
            -backend-config="auth=APIKey"
          RESOLVED_VM_PUBLIC_IP="$(terraform output -raw runtime_public_ip 2>/dev/null || true)"
          if [ -z "$RESOLVED_VM_PUBLIC_IP" ]; then
            RESOLVED_VM_PUBLIC_IP="$VM_PUBLIC_IP"
          fi
          if [ -z "$RESOLVED_VM_PUBLIC_IP" ]; then
            echo "Unable to resolve runtime VM IP from Terraform state or VM_PUBLIC_IP." >&2
            exit 1
          fi
          echo "VM_PUBLIC_IP=$RESOLVED_VM_PUBLIC_IP" >> "$GITHUB_ENV"

      - name: Run data/media smoke on VM
        env:
          DEPLOY_SSH_USER: ${{ vars.DEPLOY_SSH_USER || 'opc' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/autographs' }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          AUTOGRAPHS_SMOKE_BASE_URL: ${{ vars.AUTOGRAPHS_SMOKE_BASE_URL || 'https://autographs.jetsaredim.net' }}
          AUTOGRAPHS_TOOLS_IMAGE: ${{ vars.GHCR_IMAGE_REPOSITORY || format('ghcr.io/{0}/app', github.repository) }}-tools:latest
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bash scripts/smoke-data-media-vm.sh
