name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup runtime
        uses: ./.github/actions/setup-runtime

      - name: Validate
        run: bash scripts/validate-ci.sh

      - name: Build app image
        run: docker build --pull -f app/Dockerfile .
