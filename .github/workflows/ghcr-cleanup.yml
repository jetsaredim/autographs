name: GHCR Cleanup

on:
  schedule:
    - cron: "17 6 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show what would be deleted without deleting package versions"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE_REPOSITORY: ${{ vars.GHCR_IMAGE_REPOSITORY || format('ghcr.io/{0}/app', github.repository) }}
  GHCR_CLEANUP_RETAIN_TAGGED: ${{ vars.GHCR_CLEANUP_RETAIN_TAGGED || '10' }}
  GHCR_CLEANUP_MIN_AGE_DAYS: ${{ vars.GHCR_CLEANUP_MIN_AGE_DAYS || '7' }}
  GHCR_CLEANUP_DRY_RUN: ${{ inputs.dry_run || 'false' }}

jobs:
  cleanup:
    name: Remove old app images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean up GHCR app images
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/cleanup-ghcr-images.py
