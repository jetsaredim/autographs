name: Test Dump

on:
  pull_request:

permissions:
  contents: write

jobs:
  test-dump:
    name: Test dump
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Fix controller compile issues
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/test-dump.yml')
          workflow.unlink()

          test_path = Path('controller/tests/admin_workflow.rs')
          test_text = test_path.read_text()
          test_text = test_text.replace('    let history = app\n        .oneshot(', '    let history = app\n        .clone()\n        .oneshot(', 1)
          test_path.write_text(test_text)

          routes_path = Path('controller/src/routes.rs')
          routes_text = routes_path.read_text()
          routes_text = routes_text.replace('    pub(super) fn from_item_with_pending(', '    fn from_item_with_pending(', 1)
          routes_path.write_text(routes_text)
          PY

          cargo fmt --manifest-path controller/Cargo.toml

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add controller/tests/admin_workflow.rs controller/src/routes.rs .github/workflows/test-dump.yml
          git diff --cached --quiet && exit 0
          git commit -m "Fix admin workflow compile issues"
          git push
