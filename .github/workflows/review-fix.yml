name: Review Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  review-fix:
    name: Review fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: task-06-02-admin-api

      - name: Apply review feedback
        run: python3 .github/review_fix.py

      - name: Format controller
        run: cargo fmt --manifest-path controller/Cargo.toml

      - name: Commit review feedback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add controller/src/routes.rs controller/src/routes/admin_items.rs controller/tests/admin_workflow.rs .planning/phases/06-admin-collection-workflow/06-02-SUMMARY.md .github/workflows/review-fix.yml .github/review_fix.py
          git diff --cached --quiet && exit 0
          git commit -m "Address admin API review feedback"
          git push origin HEAD:task-06-02-admin-api
