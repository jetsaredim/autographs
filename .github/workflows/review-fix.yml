name: Review Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  review-fix:
    name: Review fix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: task-06-02-admin-api

      - name: Apply review feedback
        run: |
          python3 - <<'PY'
          from pathlib import Path

          Path('.github/workflows/review-fix.yml').unlink()

          routes_path = Path('controller/src/routes.rs')
          routes = routes_path.read_text()
          old = '(StatusCode::CREATED, Json(ItemResponse::from(item))).into_response()'
          new = '''let pending = admin_items::pending_marker(&state, item_id).await;
            (
                StatusCode::CREATED,
                Json(ItemResponse::from_item_with_pending(item, pending)),
            )
                .into_response()'''
          if old not in routes:
              raise SystemExit('expected upload_image response pattern not found')
          routes = routes.replace(old, new, 1)
          routes_path.write_text(routes)

          admin_items_path = Path('controller/src/routes/admin_items.rs')
          admin_items = admin_items_path.read_text()
          loop_old = '''            let mut summaries = Vec::with_capacity(items.len());
            for item in items {'''
          loop_new = '''            let mut summaries = Vec::with_capacity(items.len());
            // Phase 06-02 intentionally derives per-item pending markers from existing
            // item history. This keeps the API simple for the current small admin
            // catalog; a future publish-boundary store can replace this with a bulk
            // repository query when the catalog size makes the N+1 lookup material.
            for item in items {'''
          if loop_old not in admin_items:
              raise SystemExit('expected list summary loop pattern not found')
          admin_items = admin_items.replace(loop_old, loop_new, 1)

          marker_old = '''pub(super) async fn pending_marker(state: &AppState, item_id: Uuid) -> PendingMarkerResponse {'''
          marker_new = '''// Until publish-boundary persistence exists, this marker means "this item has
// recorded admin edit history" rather than "this item differs from the last
// completed static release."
pub(super) async fn pending_marker(state: &AppState, item_id: Uuid) -> PendingMarkerResponse {'''
          if marker_old not in admin_items:
              raise SystemExit('expected pending_marker pattern not found')
          admin_items = admin_items.replace(marker_old, marker_new, 1)
          admin_items_path.write_text(admin_items)

          tests_path = Path('controller/tests/admin_workflow.rs')
          tests = tests_path.read_text()
          bool_replacements = {
              'assert_eq!(list_json[0]["hasPendingChanges"], true);': 'assert_json_true(&list_json[0]["hasPendingChanges"]);',
              'assert_eq!(detail_json["pendingChanges"]["hasPendingChanges"], true);': 'assert_json_true(&detail_json["pendingChanges"]["hasPendingChanges"]);',
              'assert_eq!(patch_json["pendingChanges"]["hasPendingChanges"], true);': 'assert_json_true(&patch_json["pendingChanges"]["hasPendingChanges"]);',
              'assert_eq!(create_json["pendingChanges"]["hasPendingChanges"], true);': 'assert_json_true(&create_json["pendingChanges"]["hasPendingChanges"]);',
          }
          for src, dst in bool_replacements.items():
              if src not in tests:
                  raise SystemExit(f'expected bool assertion not found: {src}')
              tests = tests.replace(src, dst)

          if 'async fn image_upload_response_includes_pending_changes()' not in tests:
              new_test = r'''
#[tokio::test]
async fn image_upload_response_includes_pending_changes() {
    let repository = Arc::new(MemoryCatalogRepository::default());
    let item = repository
        .create(test_item_input(
            "Upload Pending Item",
            "Ashley Eckstein",
            "Photos",
            vec!["ahsoka"],
            PublicationStatus::Draft,
        ))
        .await
        .unwrap();
    let media_root = tempfile::tempdir().unwrap();
    let app = router_with_stores(
        ControllerConfig::for_test(false),
        repository,
        Arc::new(LocalMediaStore::new(media_root.path().to_path_buf())),
    );

    let boundary = "autographs-test-boundary";
    let one_by_one_png: &[u8] = &[
        137, 80, 78, 71, 13, 10, 26, 10, 0, 0, 0, 13, 73, 72, 68, 82, 0, 0, 0, 1,
        0, 0, 0, 1, 8, 6, 0, 0, 0, 31, 21, 196, 137, 0, 0, 0, 13, 73, 68,
        65, 84, 120, 156, 99, 248, 15, 4, 0, 9, 251, 3, 253, 167, 111, 129,
        219, 0, 0, 0, 0, 73, 69, 78, 68, 174, 66, 96, 130,
    ];
    let mut body = Vec::new();
    body.extend_from_slice(
        format!(
            "--{boundary}\r\nContent-Disposition: form-data; name=\"altText\"\r\n\r\nUploaded test image\r\n"
        )
        .as_bytes(),
    );
    body.extend_from_slice(
        format!(
            "--{boundary}\r\nContent-Disposition: form-data; name=\"image\"; filename=\"upload.png\"\r\nContent-Type: image/png\r\n\r\n"
        )
        .as_bytes(),
    );
    body.extend_from_slice(one_by_one_png);
    body.extend_from_slice(format!("\r\n--{boundary}--\r\n").as_bytes());

    let response = app
        .oneshot(
            Request::builder()
                .method("POST")
                .uri(format!("/admin/api/items/{}/images", item.id))
                .header(header::AUTHORIZATION, "Bearer operator-test-token")
                .header(
                    header::CONTENT_TYPE,
                    format!("multipart/form-data; boundary={boundary}"),
                )
                .body(Body::from(body))
                .unwrap(),
        )
        .await
        .unwrap();

    assert_eq!(response.status(), StatusCode::CREATED);
    let response_json = response_json(response).await;
    assert_json_true(&response_json["pendingChanges"]["hasPendingChanges"]);
    assert!(response_json["pendingChanges"]["count"].as_u64().unwrap() >= 2);
    assert_eq!(response_json["images"][0]["altText"], "Uploaded test image");
}
'''
              marker = '\n#[tokio::test]\nasync fn history_metadata_and_publication_updates_record_field_level_diffs() {'
              if marker not in tests:
                  raise SystemExit('expected insertion marker not found')
              tests = tests.replace(marker, new_test + marker, 1)

          helper_old = '''fn assert_redacted(body: &str) {'''
          helper_new = '''fn assert_json_true(value: &Value) {
    assert!(value.as_bool().is_some_and(|value| value));
}

fn assert_redacted(body: &str) {'''
          if helper_old not in tests:
              raise SystemExit('expected assert_redacted helper marker not found')
          if 'fn assert_json_true(value: &Value)' not in tests:
              tests = tests.replace(helper_old, helper_new, 1)
          tests_path.write_text(tests)

          summary_path = Path('.planning/phases/06-admin-collection-workflow/06-02-SUMMARY.md')
          summary = summary_path.read_text()
          summary = summary.replace(
              '- `save_does_not_publish`\n  - creates and patches an item\n  - confirms pending changes are returned\n  - confirms publish status remains `idle`',
              '- `save_does_not_publish`\n  - creates and patches an item\n  - confirms pending changes are returned\n  - confirms publish status remains `idle`\n- `image_upload_response_includes_pending_changes`\n  - uploads an image through the admin API\n  - confirms the mutation response includes `pendingChanges`\n  - confirms uploaded image `altText` is serialized'
          )
          summary = summary.replace(
              'Kept create/update paths separate from static publish execution; publish still only runs through explicit publish endpoints.',
              'Kept create/update/image-upload save paths separate from static publish execution; publish still only runs through explicit publish endpoints.'
          )
          summary = summary.replace(
              'The admin finder is implemented as a repository extension that composes with the existing `CatalogRepository::list()` method, so both the in-memory repository and Oracle repository get the same case-insensitive filtering behavior without duplicating predicate logic in each adapter.',
              'The admin finder is implemented as a repository extension that composes with the existing `CatalogRepository::list()` method, so both the in-memory repository and Oracle repository get the same case-insensitive filtering behavior without duplicating predicate logic in each adapter.\n\nThe admin list/detail pending marker is intentionally provisional for this phase: it means the item has recorded admin edit history, not that the item differs from the last completed static release. It currently performs one history lookup per listed item, which is acceptable for the small admin catalog in 06-02; a later publish-boundary store should replace this with a bulk repository query when needed.'
          )
          summary = summary.replace(
              'cargo test --manifest-path controller/Cargo.toml --test admin_workflow -- --nocapture',
              'cargo test --manifest-path controller/Cargo.toml --test admin_workflow image_upload_response_includes_pending_changes -- --nocapture\ncargo test --manifest-path controller/Cargo.toml --test admin_workflow -- --nocapture'
          )
          summary_path.write_text(summary)
          PY

          cargo fmt --manifest-path controller/Cargo.toml

      - name: Commit review feedback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add controller/src/routes.rs controller/src/routes/admin_items.rs controller/tests/admin_workflow.rs .planning/phases/06-admin-collection-workflow/06-02-SUMMARY.md .github/workflows/review-fix.yml
          git diff --cached --quiet && exit 0
          git commit -m "Address admin API review feedback"
          git push origin HEAD:task-06-02-admin-api
