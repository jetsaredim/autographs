  <circle class="badge" cx="572" cy="310" r="14" /><text class="badge-text" x="568" y="315">5</text>
  <circle class="badge" cx="510" cy="426" r="14" /><text class="badge-text" x="506" y="431">6</text>
  <circle class="badge" cx="604" cy="610" r="14" /><text class="badge-text" x="600" y="615">7</text>
  <circle class="badge" cx="1004" cy="376" r="14" /><text class="badge-text" x="1000" y="381">8</text>
  <circle class="badge" cx="772" cy="640" r="14" /><text class="badge-text" x="768" y="645">9</text>
  <circle class="badge" cx="510" cy="558" r="14" /><text class="badge-text" x="502" y="563">10</text>
</svg>
