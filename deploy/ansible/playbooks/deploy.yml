- hosts: runtime
  become: true
  vars:
    deploy_path: /opt/autographs
    compose_path: "{{ deploy_path }}/compose"
    wallet_path: "{{ deploy_path }}/wallet"
    secrets_path: "{{ deploy_path }}/secrets"
    caddy_path: "{{ deploy_path }}/caddy"

  tasks:
    - name: Ensure deployment directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ deploy_user }}"
        mode: "0755"
      loop:
        - "{{ deploy_path }}"
        - "{{ compose_path }}"
        - "{{ wallet_path }}"
        - "{{ secrets_path }}"
        - "{{ caddy_path }}"

    - name: Write compose env
      template:
        src: env.j2
        dest: "{{ compose_path }}/.env-new"
        owner: "{{ deploy_user }}"
        mode: "0600"

    - name: Copy compose file
      copy:
        src: ../../compose/compose.prod.yaml
        dest: "{{ compose_path }}/compose.prod.yaml-new"
        owner: "{{ deploy_user }}"
        mode: "0644"

