[defaults]
roles_path = roles
host_key_checking = False
inventory = inventory/ci.ini
retry_files_enabled = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[ssh_connection]
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes
pipelining = True
