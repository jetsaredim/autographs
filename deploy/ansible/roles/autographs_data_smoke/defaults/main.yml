autographs_data_smoke_deploy_path: /opt/autographs
autographs_data_smoke_env_path: "{{ autographs_data_smoke_deploy_path }}/env"
autographs_data_smoke_wallet_path: "{{ autographs_data_smoke_deploy_path }}/wallet"
autographs_data_smoke_secrets_path: "{{ autographs_data_smoke_deploy_path }}/secrets"
autographs_data_smoke_network_name: autographs
autographs_data_smoke_node_options: --max-old-space-size=384
autographs_data_smoke_command_kill_after_seconds: 30
autographs_data_smoke_commands:
  - name: migrate
    command: db:migrate
    timeout_seconds: 600
  - name: seed
    command: db:seed
    timeout_seconds: 600
  - name: smoke
    command: data:smoke
    timeout_seconds: 1800
