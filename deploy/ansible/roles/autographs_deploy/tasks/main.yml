- name: Ensure runtime packages are installed
  ansible.builtin.package:
    name: "{{ autographs_deploy_packages }}"
    state: present

- name: Ensure operator diagnostic packages are installed
  ansible.builtin.dnf:
    name: "{{ autographs_deploy_operator_packages }}"
    state: present
    enablerepo: "{{ autographs_deploy_operator_package_repos }}"
  when: autographs_deploy_operator_packages | length > 0

- name: Ensure firewalld is enabled
  ansible.builtin.systemd:
    name: firewalld.service
    state: started
    enabled: true
  failed_when: false

- name: Mask unnecessary systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ autographs_deploy_masked_services }}"
  failed_when: false

- name: Check swap file size
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      test -f {{ autographs_deploy_swap_file | quote }}
      [ "$(du -m {{ autographs_deploy_swap_file | quote }} | awk '{print $1}')" -ge {{ autographs_deploy_swap_size_mib }} ]
    executable: /bin/bash
  register: autographs_deploy_swap_size_check
  changed_when: false
  failed_when: false

- name: Create swap file
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if swapon --show=NAME --noheadings | grep -Fxq {{ autographs_deploy_swap_file | quote }}; then
        swapoff {{ autographs_deploy_swap_file | quote }}
      fi
      rm -f {{ autographs_deploy_swap_file | quote }}
      fallocate -l {{ autographs_deploy_swap_size_mib }}M {{ autographs_deploy_swap_file | quote }}
      chmod 600 {{ autographs_deploy_swap_file | quote }}
      mkswap {{ autographs_deploy_swap_file | quote }}
    executable: /bin/bash
  when: autographs_deploy_swap_size_check.rc != 0
  changed_when: true

- name: Check whether swap file is active
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      swapon --show=NAME --noheadings | grep -Fxq {{ autographs_deploy_swap_file | quote }}
    executable: /bin/bash
  register: autographs_deploy_swap_active_check
  changed_when: false
  failed_when: false

- name: Enable swap file
  ansible.builtin.command:
    cmd: "swapon {{ autographs_deploy_swap_file }}"
  when: autographs_deploy_swap_active_check.rc != 0
  changed_when: true

- name: Persist swap file in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^[^#\s]+\s+none\s+swap\s+'
    line: "{{ autographs_deploy_swap_file }} none swap sw 0 0"
    create: true
    mode: "0644"

- name: Configure swap sysctl
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ autographs_deploy_swappiness }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-autographs-swap.conf
    reload: true

- name: Open HTTP and HTTPS in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - http
    - https
  failed_when: false

- name: Ensure deployment directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ autographs_deploy_deploy_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_env_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_wallet_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_secrets_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_caddy_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_static_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_quadlet_path }}"
      owner: root
      group: root
      mode: "0755"

- name: Validate controller provider configuration
  ansible.builtin.assert:
    that:
      - autographs_deploy_controller_db_provider in ['local', 'oracle']
      - autographs_deploy_controller_media_storage_provider in ['local', 'oci-instance-principal']
      - autographs_deploy_controller_db_provider == 'oracle'
      - autographs_deploy_controller_media_storage_provider == 'oci-instance-principal'
      - >-
        autographs_deploy_controller_media_storage_provider != 'oci-instance-principal'
        or (
          oci_media_namespace | default(lookup('env', 'OCI_MEDIA_NAMESPACE') | default('', true), true) | trim | length > 0
          and oci_media_bucket_name | default('autographs-media-prod', true) | trim | length > 0
        )
    fail_msg: >-
      Deployed controller providers must be persistent:
      AUTOGRAPHS_CONTROLLER_DB_PROVIDER=oracle and
      AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER=oci-instance-principal
      with OCI_MEDIA_NAMESPACE and OCI_MEDIA_BUCKET_NAME.
  no_log: true

- name: Inspect deployed app environment file
  ansible.builtin.stat:
    path: "{{ autographs_deploy_env_path }}/app.env"
  register: autographs_deploy_app_env_stat
  changed_when: false

- name: Read deployed app environment file
  ansible.builtin.slurp:
    src: "{{ autographs_deploy_env_path }}/app.env"
  register: autographs_deploy_app_env_file
  when: autographs_deploy_app_env_stat.stat.exists
  no_log: true

- name: Resolve deployed admin credentials
  ansible.builtin.set_fact:
    autographs_deploy_admin_password_input: >-
      {{
        autographs_deploy_admin_password
        | default(autographs_admin_password | default('', true), true)
        | default(lookup('env', 'AUTOGRAPHS_ADMIN_PASSWORD') | default('', true), true)
        | trim
      }}
    autographs_deploy_admin_password_hash_input: >-
      {{
        autographs_deploy_admin_password_hash
        | default(autographs_admin_password_hash | default('', true), true)
        | default(lookup('env', 'AUTOGRAPHS_ADMIN_PASSWORD_HASH') | default('', true), true)
        | trim
      }}
    autographs_deploy_admin_password_existing: >-
      {{
        (
          autographs_deploy_app_env_file.content
          | b64decode
          | regex_findall('(?m)^AUTOGRAPHS_ADMIN_PASSWORD=([^\n]*)$')
          | first
        ) | default('', true) | trim
        if autographs_deploy_app_env_stat.stat.exists
        else ''
      }}
    autographs_deploy_admin_password_hash_existing: >-
      {{
        (
          autographs_deploy_app_env_file.content
          | b64decode
          | regex_findall('(?m)^AUTOGRAPHS_ADMIN_PASSWORD_HASH=([^\n]*)$')
          | first
        ) | default('', true) | trim
        if autographs_deploy_app_env_stat.stat.exists
        else ''
      }}
  no_log: true

- name: Select deployed admin credentials
  ansible.builtin.set_fact:
    autographs_deploy_admin_password_resolved: >-
      {{
        autographs_deploy_admin_password_input
        if autographs_deploy_admin_password_input | length > 0
          and autographs_deploy_admin_password_hash_input | length == 0
        else (
          ''
          if autographs_deploy_admin_password_hash_input | length > 0
          else (
            autographs_deploy_admin_password_existing
            if autographs_deploy_admin_password_existing | length > 0
            else (
              ''
              if autographs_deploy_admin_password_hash_existing | length > 0
              else lookup('password', '/dev/null length=32 chars=ascii_letters,digits')
            )
          )
        )
      }}
    autographs_deploy_admin_password_hash_resolved: >-
      {{
        autographs_deploy_admin_password_hash_input
        if autographs_deploy_admin_password_hash_input | length > 0
        else (
          ''
          if autographs_deploy_admin_password_input | length > 0
          else autographs_deploy_admin_password_hash_existing
        )
      }}
  no_log: true

- name: Validate deployed admin authentication secret
  ansible.builtin.assert:
    that:
      - >-
        (
          autographs_deploy_admin_password_resolved | default('', true) | trim | length
        ) > 0
        or (
          autographs_deploy_admin_password_hash_resolved | default('', true) | trim | length
        ) > 0
        or (
          autographs_operator_api_token | default(lookup('env', 'AUTOGRAPHS_OPERATOR_API_TOKEN') | default('', true), true) | trim | length
        ) > 0
    fail_msg: >-
      Set a non-empty autographs_deploy_admin_password,
      autographs_deploy_admin_password_hash, or autographs_operator_api_token
      for deployed admin routes.
  no_log: true

- name: Write app environment file
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ autographs_deploy_env_path }}/app.env"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  notify:
    - Restart controller container
    - Restart Caddy container

- name: Write staged controller environment file
  ansible.builtin.template:
    src: controller.env.j2
    dest: "{{ autographs_deploy_env_path }}/controller.env"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  notify: Restart controller container

- name: Inspect generated static release volume
  ansible.builtin.command:
    cmd: >-
      podman volume inspect {{ autographs_deploy_static_vol_name }}
      --format {% raw %}'{{ .Mountpoint }}'{% endraw %}
  register: autographs_deploy_static_volume
  changed_when: false
  failed_when: false

- name: Check promoted static release manifest
  ansible.builtin.stat:
    path: "{{ autographs_deploy_static_volume.stdout }}/current/manifest.json"
  register: autographs_deploy_static_manifest
  when: autographs_deploy_static_volume.rc == 0

- name: Check promoted admin shell artifacts
  ansible.builtin.stat:
    path: "{{ autographs_deploy_static_volume.stdout }}/current/{{ item }}"
  loop:
    - admin/index.html
    - admin/admin.js
    - admin/admin.css
  register: autographs_deploy_static_admin_artifacts
  when: autographs_deploy_static_volume.rc == 0

- name: Read promoted static release manifest
  ansible.builtin.slurp:
    src: "{{ autographs_deploy_static_volume.stdout }}/current/manifest.json"
  register: autographs_deploy_static_manifest_file
  when:
    - autographs_deploy_static_volume.rc == 0
    - autographs_deploy_static_manifest.stat.exists | default(false)
    - autographs_deploy_static_manifest.stat.isreg | default(false)

- name: Require promoted static release before Caddy cutover
  ansible.builtin.assert:
    that:
      - autographs_deploy_static_volume.rc == 0
      - autographs_deploy_static_manifest.stat.exists | default(false)
      - autographs_deploy_static_manifest.stat.isreg | default(false)
      - autographs_deploy_static_admin_artifacts.results | default([]) | length == 3
      - >-
        autographs_deploy_static_admin_artifacts.results
        | default([])
        | rejectattr('stat.exists', 'equalto', true)
        | list
        | length == 0
      - >-
        autographs_deploy_static_admin_artifacts.results
        | default([])
        | rejectattr('stat.isreg', 'equalto', true)
        | list
        | length == 0
      - >-
        [
          'admin/index.html',
          'admin/admin.js',
          'admin/admin.css'
        ]
        | difference(
          (
            autographs_deploy_static_manifest_file.content
            | default('e30=')
            | b64decode
            | from_json
          ).artifacts
          | default([])
          | map(attribute='path')
          | list
        )
        | length == 0
    fail_msg: >-
      Caddy is configured to serve the generated static public site from
      /srv/autographs/static/current, but the {{ autographs_deploy_static_vol_name }}
      Podman volume does not contain current/manifest.json plus the generated
      admin shell artifacts listed in that manifest. Run a successful full static
      publish and verify the promoted release before deploying this Caddy cutover.

- name: Copy Caddyfile
  ansible.builtin.copy:
    src: Caddyfile
    dest: "{{ autographs_deploy_caddy_path }}/Caddyfile"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0644"
  notify: Restart Caddy container

- name: Install OCI private key
  ansible.builtin.copy:
    content: "{{ lookup('env', 'OCI_PRIVATE_KEY_PEM') | default('', true) }}"
    dest: "{{ autographs_deploy_secrets_path }}/oci_api_key.pem"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  notify:
    - Restart controller container

- name: Write Oracle DB wallet archive
  ansible.builtin.copy:
    content: "{{ lookup('env', 'ORACLE_DB_WALLET_ZIP_BASE64') | default('', true) }}"
    dest: "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  register: autographs_deploy_wallet_archive

- name: Decode Oracle DB wallet archive # noqa: no-handler
  ansible.builtin.shell:
    cmd: "base64 -d wallet.zip.b64 > wallet.zip"
    chdir: "{{ autographs_deploy_wallet_path }}"
  no_log: true
  changed_when: autographs_deploy_wallet_archive.changed
  when: autographs_deploy_wallet_archive.changed

- name: Extract Oracle DB wallet archive # noqa: no-handler
  ansible.builtin.unarchive:
    src: "{{ autographs_deploy_wallet_path }}/wallet.zip"
    dest: "{{ autographs_deploy_wallet_path }}"
    remote_src: true
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  when: autographs_deploy_wallet_archive.changed
  notify:
    - Restart controller container

- name: Normalize Oracle DB wallet location for native clients
  ansible.builtin.copy:
    src: sqlnet.ora
    dest: "{{ autographs_deploy_wallet_path }}/sqlnet.ora"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  notify:
    - Restart controller container

- name: Remove temp wallet archives
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    - "{{ autographs_deploy_wallet_path }}/wallet.zip"
  no_log: true

- name: GHCR login for image pulls
  containers.podman.podman_login:
    username: "{{ lookup('env', 'GITHUB_ACTOR') | default('', true) }}"
    password: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"
    registry: ghcr.io
  no_log: true

- name: Pull runtime images
  ansible.builtin.command:
    cmd: "podman pull {{ item }}"
  loop:
    - "{{ autographs_controller_image }}"
    - "docker.io/library/caddy:2-alpine"
  register: autographs_deploy_image_pull
  changed_when: >-
    'Downloaded newer image' in autographs_deploy_image_pull.stdout
    or 'Copying blob' in autographs_deploy_image_pull.stdout
    or 'Writing manifest' in autographs_deploy_image_pull.stdout

- name: GHCR logout after image pulls
  containers.podman.podman_logout:
    registry: ghcr.io
  failed_when: false

- name: Stop and disable retired Next.js app service
  ansible.builtin.systemd:
    name: autographs-app.service
    state: stopped
    enabled: false
    daemon_reload: true
  failed_when: false

- name: Remove retired Next.js app quadlet
  ansible.builtin.file:
    path: "{{ autographs_deploy_quadlet_path }}/autographs-app.container"
    state: absent
  notify: Reload systemd

- name: Remove retired Next.js app container
  ansible.builtin.command:
    argv:
      - podman
      - rm
      - --force
      - autographs-app
  register: autographs_deploy_remove_app_container
  changed_when: autographs_deploy_remove_app_container.rc == 0
  failed_when: false

- name: Install Podman quadlet units
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ autographs_deploy_quadlet_path }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: autographs.network.j2
      dest: autographs.network
    - src: autographs-controller.container.j2
      dest: autographs-controller.container
    - src: autographs-caddy.container.j2
      dest: autographs-caddy.container
    - src: autographs-static.volume.j2
      dest: autographs-static.volume
    - src: autographs-caddy-data.volume.j2
      dest: autographs-caddy-data.volume
    - src: autographs-caddy-config.volume.j2
      dest: autographs-caddy-config.volume
  notify:
    - Reload systemd
    - Restart controller container
    - Restart Caddy container

- name: Flush quadlet handlers before enabling services
  ansible.builtin.meta: flush_handlers

- name: Enable and start Podman quadlet services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - autographs-network.service
    - autographs-controller.service
    - autographs-caddy.service

- name: Verify current static release listener
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ autographs_deploy_candidate_preview_port }}/manifest.json"
    method: GET
    status_code:
      - 200
    return_content: false
  register: autographs_deploy_static_preview_check
  retries: 12
  delay: 5
  until: autographs_deploy_static_preview_check.status is defined

- name: Verify Caddy admin shell route
  ansible.builtin.uri:
    url: "https://127.0.0.1/admin/"
    method: GET
    headers:
      Host: "{{ autographs_deploy_domain }}"
    status_code:
      - 200
    validate_certs: false
    return_content: false
  register: autographs_deploy_admin_shell_check
  retries: 12
  delay: 5
  until: autographs_deploy_admin_shell_check.status is defined
