- name: Ensure runtime packages are installed
  ansible.builtin.package:
    name: "{{ autographs_deploy_packages }}"
    state: present

- name: Ensure firewalld is enabled
  ansible.builtin.systemd:
    name: firewalld.service
    state: started
    enabled: true
  failed_when: false

- name: Mask unnecessary systemd services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
    masked: true
  loop: "{{ autographs_deploy_masked_services }}"
  failed_when: false

- name: Check swap file size
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      test -f {{ autographs_deploy_swap_file | quote }}
      [ "$(du -m {{ autographs_deploy_swap_file | quote }} | awk '{print $1}')" -ge {{ autographs_deploy_swap_size_mib }} ]
    executable: /bin/bash
  register: autographs_deploy_swap_size_check
  changed_when: false
  failed_when: false

- name: Create swap file
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      if swapon --show=NAME --noheadings | grep -Fxq {{ autographs_deploy_swap_file | quote }}; then
        swapoff {{ autographs_deploy_swap_file | quote }}
      fi
      rm -f {{ autographs_deploy_swap_file | quote }}
      fallocate -l {{ autographs_deploy_swap_size_mib }}M {{ autographs_deploy_swap_file | quote }}
      chmod 600 {{ autographs_deploy_swap_file | quote }}
      mkswap {{ autographs_deploy_swap_file | quote }}
    executable: /bin/bash
  when: autographs_deploy_swap_size_check.rc != 0
  changed_when: true

- name: Check whether swap file is active
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      swapon --show=NAME --noheadings | grep -Fxq {{ autographs_deploy_swap_file | quote }}
    executable: /bin/bash
  register: autographs_deploy_swap_active_check
  changed_when: false
  failed_when: false

- name: Enable swap file
  ansible.builtin.command:
    cmd: "swapon {{ autographs_deploy_swap_file }}"
  when: autographs_deploy_swap_active_check.rc != 0
  changed_when: true

- name: Persist swap file in fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^[^#\s]+\s+none\s+swap\s+'
    line: "{{ autographs_deploy_swap_file }} none swap sw 0 0"
    create: true
    mode: "0644"

- name: Configure swap sysctl
  ansible.posix.sysctl:
    name: vm.swappiness
    value: "{{ autographs_deploy_swappiness }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-autographs-swap.conf
    reload: true

- name: Open HTTP and HTTPS in firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - http
    - https
  failed_when: false

- name: Ensure deployment directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ autographs_deploy_deploy_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_env_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_wallet_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_secrets_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0700"
    - path: "{{ autographs_deploy_caddy_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_static_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_static_admin_path }}"
      owner: "{{ autographs_deploy_user }}"
      group: "{{ autographs_deploy_user }}"
      mode: "0755"
    - path: "{{ autographs_deploy_quadlet_path }}"
      owner: root
      group: root
      mode: "0755"

- name: Validate controller provider configuration
  ansible.builtin.assert:
    that:
      - autographs_deploy_controller_db_provider in ['local', 'oracle']
      - autographs_deploy_controller_media_storage_provider in ['local', 'oci-s3']
      - autographs_deploy_controller_db_provider == 'oracle'
      - autographs_deploy_controller_media_storage_provider == 'oci-s3'
      - >-
        autographs_deploy_controller_media_storage_provider != 'oci-s3'
        or (
          lookup('env', 'OCI_S3_ENDPOINT') | default('', true) | trim | length > 0
          and (
            (
              lookup('env', 'OCI_S3_ACCESS_KEY') | default('', true) | trim | length > 0
              and lookup('env', 'OCI_S3_SECRET_KEY') | default('', true) | trim | length > 0
            )
            or (
              lookup('env', 'OCI_ADMIN_VAULT_ID') | default('', true) | trim | length > 0
              and lookup('env', 'OCI_TENANCY_OCID') | default('', true) | trim | length > 0
              and lookup('env', 'OCI_CLI_USER_OCID') | default('', true) | trim | length > 0
              and lookup('env', 'OCI_FINGERPRINT') | default('', true) | trim | length > 0
              and lookup('env', 'OCI_PRIVATE_KEY_PEM') | default('', true) | trim | length > 0
            )
          )
        )
    fail_msg: >-
      Deployed controller providers must be persistent:
      AUTOGRAPHS_CONTROLLER_DB_PROVIDER=oracle and
      AUTOGRAPHS_CONTROLLER_MEDIA_STORAGE_PROVIDER=oci-s3 with either direct
      OCI S3 credentials or OCI Vault coordinates for admin runtime credentials.
  no_log: true

- name: Validate deployed admin authentication secret
  ansible.builtin.assert:
    that:
      - >-
        (
          autographs_admin_password | default(lookup('env', 'AUTOGRAPHS_ADMIN_PASSWORD') | default('', true), true) | trim | length
        ) > 0
        or (
          autographs_admin_password_hash | default(lookup('env', 'AUTOGRAPHS_ADMIN_PASSWORD_HASH') | default('', true), true) | trim | length
        ) > 0
        or (
          autographs_operator_api_token | default(lookup('env', 'AUTOGRAPHS_OPERATOR_API_TOKEN') | default('', true), true) | trim | length
        ) > 0
    fail_msg: "Set a non-empty autographs_admin_password, autographs_admin_password_hash, or autographs_operator_api_token for deployed admin routes."
  no_log: true

- name: Write app environment file
  ansible.builtin.template:
    src: app.env.j2
    dest: "{{ autographs_deploy_env_path }}/app.env"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  notify:
    - Restart app container
    - Restart controller container
    - Restart Caddy container

- name: Copy static admin shell
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../controller/static-admin/"
    dest: "{{ autographs_deploy_static_admin_path }}/"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    directory_mode: "0755"
    mode: "0644"
  notify: Restart Caddy container

- name: Write staged controller environment file
  ansible.builtin.template:
    src: controller.env.j2
    dest: "{{ autographs_deploy_env_path }}/controller.env"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  notify: Restart controller container

- name: Copy Caddyfile
  ansible.builtin.copy:
    src: Caddyfile
    dest: "{{ autographs_deploy_caddy_path }}/Caddyfile"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0644"
  notify: Restart Caddy container

- name: Install OCI private key
  ansible.builtin.copy:
    content: "{{ lookup('env', 'OCI_PRIVATE_KEY_PEM') | default('', true) }}"
    dest: "{{ autographs_deploy_secrets_path }}/oci_api_key.pem"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  notify:
    - Restart app container
    - Restart controller container

- name: Write Oracle DB wallet archive
  ansible.builtin.copy:
    content: "{{ lookup('env', 'ORACLE_DB_WALLET_ZIP_BASE64') | default('', true) }}"
    dest: "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  register: autographs_deploy_wallet_archive

- name: Decode Oracle DB wallet archive # noqa: no-handler
  ansible.builtin.shell:
    cmd: "base64 -d wallet.zip.b64 > wallet.zip"
    chdir: "{{ autographs_deploy_wallet_path }}"
  no_log: true
  changed_when: autographs_deploy_wallet_archive.changed
  when: autographs_deploy_wallet_archive.changed

- name: Extract Oracle DB wallet archive # noqa: no-handler
  ansible.builtin.unarchive:
    src: "{{ autographs_deploy_wallet_path }}/wallet.zip"
    dest: "{{ autographs_deploy_wallet_path }}"
    remote_src: true
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true
  when: autographs_deploy_wallet_archive.changed
  notify:
    - Restart app container
    - Restart controller container

- name: Remove temp wallet archives
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    - "{{ autographs_deploy_wallet_path }}/wallet.zip"
  no_log: true

- name: GHCR login for image pulls
  containers.podman.podman_login:
    username: "{{ lookup('env', 'GITHUB_ACTOR') | default('', true) }}"
    password: "{{ lookup('env', 'GHCR_TOKEN') | default('', true) }}"
    registry: ghcr.io
  no_log: true

- name: Pull runtime images
  ansible.builtin.command:
    cmd: "podman pull {{ item }}"
  loop:
    - "{{ autographs_app_image }}"
    - "{{ autographs_controller_image }}"
    - "{{ autographs_deploy_caddy_image }}"
  register: autographs_deploy_image_pull
  changed_when: >-
    'Downloaded newer image' in autographs_deploy_image_pull.stdout
    or 'Copying blob' in autographs_deploy_image_pull.stdout
    or 'Writing manifest' in autographs_deploy_image_pull.stdout

- name: GHCR logout after image pulls
  containers.podman.podman_logout:
    registry: ghcr.io
  failed_when: false

- name: Install Podman quadlet units
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ autographs_deploy_quadlet_path }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - src: autographs.network.j2
      dest: autographs.network
    - src: autographs-app.container.j2
      dest: autographs-app.container
    - src: autographs-controller.container.j2
      dest: autographs-controller.container
    - src: autographs-caddy.container.j2
      dest: autographs-caddy.container
    - src: autographs-static.volume.j2
      dest: autographs-static.volume
    - src: autographs-caddy-data.volume.j2
      dest: autographs-caddy-data.volume
    - src: autographs-caddy-config.volume.j2
      dest: autographs-caddy-config.volume
  notify:
    - Reload systemd
    - Restart app container
    - Restart controller container
    - Restart Caddy container

- name: Flush quadlet handlers before enabling services
  ansible.builtin.meta: flush_handlers

- name: Enable and start Podman quadlet services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop:
    - autographs-network.service
    - autographs-app.service
    - autographs-controller.service
    - autographs-caddy.service

- name: Verify staged static preview listener before generated release exists
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ autographs_deploy_candidate_preview_port }}/"
    method: GET
    status_code:
      - 200
      - 403
      - 404
    return_content: false
  register: autographs_deploy_static_preview_check
  retries: 12
  delay: 5
  until: autographs_deploy_static_preview_check.status is defined
