- name: Ensure deployment directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0755"
  loop:
    - "{{ autographs_deploy_deploy_path }}"
    - "{{ autographs_deploy_compose_path }}"
    - "{{ autographs_deploy_wallet_path }}"
    - "{{ autographs_deploy_secrets_path }}"
    - "{{ autographs_deploy_caddy_path }}"

- name: Write compose env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ autographs_deploy_compose_path }}/.env"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true

- name: Copy compose file
  ansible.builtin.copy:
    src: compose.prod.yaml
    dest: "{{ autographs_deploy_compose_path }}/compose.prod.yaml"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0644"

- name: Copy Caddyfile
  ansible.builtin.copy:
    src: Caddyfile
    dest: "{{ autographs_deploy_caddy_path }}/Caddyfile"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0644"

- name: Install OCI private key
  ansible.builtin.copy:
    content: "{{ lookup('env', 'OCI_PRIVATE_KEY_PEM') | default('', true) }}"
    dest: "{{ autographs_deploy_secrets_path }}/oci_api_key.pem"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true

- name: Write Oracle DB wallet archive
  ansible.builtin.copy:
    content: "{{ lookup('env', 'ORACLE_DB_WALLET_ZIP_BASE64') | default('', true) }}"
    dest: "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true

- name: Check for/install unzip
  become: true
  ansible.builtin.package:
    name: unzip
    state: present

- name: Decode Oracle DB wallet archive
  ansible.builtin.shell:
    cmd: "base64 -d wallet.zip.b64 > wallet.zip"
    chdir: "{{ autographs_deploy_wallet_path }}"
  no_log: true
  changed_when: true

- name: Extract Oracle DB wallet archive
  ansible.builtin.unarchive:
    src: "{{ autographs_deploy_wallet_path }}/wallet.zip"
    dest: "{{ autographs_deploy_wallet_path }}"
    remote_src: true
    owner: "{{ autographs_deploy_user }}"
    group: "{{ autographs_deploy_user }}"
    mode: "0600"
  no_log: true

- name: Remove temp wallet archives
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ autographs_deploy_wallet_path }}/wallet.zip.b64"
    - "{{ autographs_deploy_wallet_path }}/wallet.zip"
  no_log: true

