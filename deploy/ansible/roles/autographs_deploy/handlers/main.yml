- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart controller container
  ansible.builtin.systemd:
    name: autographs-controller.service
    state: restarted
    daemon_reload: true
  failed_when: false

- name: Restart Caddy container
  ansible.builtin.systemd:
    name: autographs-caddy.service
    state: restarted
    daemon_reload: true
  failed_when: false
